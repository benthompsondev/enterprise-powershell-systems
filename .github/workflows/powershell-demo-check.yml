name: PowerShell demo checks

on:
  push:
  pull_request:

jobs:
  learner-onboarding-demo:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run learner onboarding demo check
        shell: pwsh
        run: |
          Set-Location "enterprise-healthcare-systems/learner-onboarding-automation"
          ./tests/Run-DemoCheck.ps1

  password-remediation-demo:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run password remediation demo check
        shell: pwsh
        run: |
          Set-Location "enterprise-healthcare-systems/password-remediation-workflow"
          ./tests/Run-DemoCheck.ps1

  browser-bookmark-migration-demo:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run browser bookmark migration demo check
        shell: pwsh
        run: |
          Set-Location "enterprise-endpoint-systems/browser-bookmark-migration"
          ./tests/Run-DemoCheck.ps1

  workstation-migration-state-demo:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run workstation migration state demo check
        shell: pwsh
        run: |
          Set-Location "enterprise-endpoint-systems/workstation-migration-state-toolkit"
          ./tests/Run-DemoCheck.ps1
