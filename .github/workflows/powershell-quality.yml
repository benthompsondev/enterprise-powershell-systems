name: PowerShell quality checks

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Parse all PowerShell scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $files = Get-ChildItem -Path . -Recurse -Filter *.ps1
          $parseErrors = New-Object System.Collections.Generic.List[string]

          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($file.FullName, [ref]$tokens, [ref]$errors) | Out-Null

            foreach ($errorItem in $errors) {
              $parseErrors.Add("$($file.FullName): $($errorItem.Message)")
            }
          }

          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Error $_ }
            exit 1
          }

          Write-Host "Parsed $($files.Count) PowerShell scripts without syntax errors."

  psscriptanalyzer-errors:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Run PSScriptAnalyzer error check
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error

          if ($results) {
            $results | Format-Table -AutoSize
            throw "PSScriptAnalyzer found error-level items to review."
          }
          else {
            Write-Host "PSScriptAnalyzer did not report error-level findings."
          }
